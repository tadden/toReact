<svg width="960" height="620" viewBox="0 0 960 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="620" rx="28" fill="#EAF4FB"/>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#A8C0D6" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#31A354"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E55353"/>
    </marker>
    <style>
      .title { font: 700 18px Arial, sans-serif; fill: #27323F; }
      .text { font: 400 15px Arial, sans-serif; fill: #384657; }
      .label { font: 700 14px Arial, sans-serif; }
      .badge { font: 600 14px Arial, sans-serif; fill: #506078; }
      .code { font: 600 14px 'Courier New', monospace; fill: #506078; }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <rect x="300" y="36" width="190" height="76" rx="18" fill="white"/>
    <text x="395" y="67" text-anchor="middle" class="title">Это стрелочная</text>
    <text x="395" y="92" text-anchor="middle" class="title">функция?</text>
  </g>
  <line x1="490" y1="74" x2="680" y2="74" stroke="#31A354" stroke-width="3.5" marker-end="url(#arrow-green)"/>
  <text x="575" y="63" class="label" fill="#31A354">ДА</text>
  <g filter="url(#shadow)">
    <rect x="692" y="36" width="220" height="76" rx="18" fill="white"/>
    <rect x="710" y="52" width="44" height="24" rx="8" fill="#E8F0FF"/>
    <text x="732" y="68" text-anchor="middle" class="code">this</text>
    <text x="766" y="68" class="text">берется из внешней</text>
    <text x="732" y="92" class="text">области видимости</text>
  </g>

  <line x1="395" y1="112" x2="395" y2="184" stroke="#E55353" stroke-width="3.5" marker-end="url(#arrow-red)"/>
  <text x="407" y="153" class="label" fill="#E55353">НЕТ</text>

  <g filter="url(#shadow)">
    <rect x="292" y="192" width="206" height="92" rx="18" fill="white"/>
    <text x="395" y="223" text-anchor="middle" class="title">Используются</text>
    <text x="395" y="248" text-anchor="middle" class="title">call, apply или bind?</text>
  </g>
  <line x1="498" y1="238" x2="680" y2="238" stroke="#31A354" stroke-width="3.5" marker-end="url(#arrow-green)"/>
  <text x="575" y="227" class="label" fill="#31A354">ДА</text>
  <g filter="url(#shadow)">
    <rect x="692" y="200" width="220" height="76" rx="18" fill="white"/>
    <rect x="710" y="216" width="44" height="24" rx="8" fill="#E8F0FF"/>
    <text x="732" y="232" text-anchor="middle" class="code">this</text>
    <text x="766" y="232" class="text">равен объекту,</text>
    <text x="732" y="256" class="text">переданному в вызове</text>
  </g>

  <line x1="395" y1="284" x2="395" y2="356" stroke="#E55353" stroke-width="3.5" marker-end="url(#arrow-red)"/>
  <text x="407" y="325" class="label" fill="#E55353">НЕТ</text>

  <g filter="url(#shadow)">
    <rect x="280" y="364" width="230" height="92" rx="18" fill="white"/>
    <text x="395" y="395" text-anchor="middle" class="title">Функция вызвана как</text>
    <text x="395" y="420" text-anchor="middle" class="title">метод объекта?</text>
    <text x="395" y="442" text-anchor="middle" class="badge">obj.method()</text>
  </g>
  <line x1="510" y1="410" x2="680" y2="410" stroke="#31A354" stroke-width="3.5" marker-end="url(#arrow-green)"/>
  <text x="584" y="399" class="label" fill="#31A354">ДА</text>
  <g filter="url(#shadow)">
    <rect x="692" y="372" width="220" height="76" rx="18" fill="white"/>
    <rect x="710" y="388" width="44" height="24" rx="8" fill="#E8F0FF"/>
    <text x="732" y="404" text-anchor="middle" class="code">this</text>
    <text x="766" y="404" class="text">это объект слева</text>
    <text x="732" y="428" class="text">от точки</text>
  </g>

  <line x1="395" y1="456" x2="395" y2="528" stroke="#E55353" stroke-width="3.5" marker-end="url(#arrow-red)"/>
  <text x="407" y="497" class="label" fill="#E55353">НЕТ</text>

  <g filter="url(#shadow)">
    <rect x="292" y="536" width="206" height="56" rx="18" fill="white"/>
    <text x="395" y="570" text-anchor="middle" class="title">Строгий режим?</text>
  </g>

  <line x1="498" y1="564" x2="680" y2="564" stroke="#31A354" stroke-width="3.5" marker-end="url(#arrow-green)"/>
  <text x="575" y="553" class="label" fill="#31A354">ДА</text>
  <g filter="url(#shadow)">
    <rect x="692" y="526" width="220" height="76" rx="18" fill="white"/>
    <rect x="710" y="542" width="44" height="24" rx="8" fill="#E8F0FF"/>
    <text x="732" y="558" text-anchor="middle" class="code">this</text>
    <text x="766" y="558" class="text">равен</text>
    <rect x="820" y="542" width="74" height="24" rx="8" fill="#E8F0FF"/>
    <text x="857" y="558" text-anchor="middle" class="code">undefined</text>
  </g>

  <line x1="292" y1="564" x2="120" y2="564" stroke="#E55353" stroke-width="3.5" marker-end="url(#arrow-red)"/>
  <text x="242" y="553" class="label" fill="#E55353">НЕТ</text>
  <g filter="url(#shadow)">
    <rect x="26" y="526" width="190" height="76" rx="18" fill="white"/>
    <rect x="44" y="542" width="44" height="24" rx="8" fill="#E8F0FF"/>
    <text x="66" y="558" text-anchor="middle" class="code">this</text>
    <text x="100" y="558" class="text">равен</text>
    <rect x="132" y="542" width="64" height="24" rx="8" fill="#E8F0FF"/>
    <text x="164" y="558" text-anchor="middle" class="code">window</text>
  </g>
</svg>
