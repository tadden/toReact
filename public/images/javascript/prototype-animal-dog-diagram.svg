<svg width="760" height="260" viewBox="0 0 760 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="760" height="260" rx="24" fill="#F4F9FF"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#B6C9E1" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6C8CFF"/>
    </marker>
    <style>
      .label { font: 700 24px Arial, sans-serif; fill: #475569; }
      .text { font: 500 24px Arial, sans-serif; fill: #475569; }
      .code { font: 600 24px 'Courier New', monospace; fill: #556070; }
    </style>
  </defs>
  <text x="220" y="52" text-anchor="middle" class="label">dog</text>
  <text x="540" y="52" text-anchor="middle" class="label">animal</text>
  <g filter="url(#shadow)">
    <rect x="90" y="82" width="250" height="92" rx="16" fill="white" stroke="#6C8CFF" stroke-width="3"/>
    <text x="215" y="120" text-anchor="middle" class="text">name: "Mango"</text>
    <text x="215" y="154" text-anchor="middle" class="code">[[Prototype]]: animal</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="430" y="82" width="220" height="92" rx="16" fill="white" stroke="#6C8CFF" stroke-width="3"/>
    <text x="540" y="136" text-anchor="middle" class="text">legs: 4</text>
  </g>
  <path d="M250 176C300 230 370 225 425 140" stroke="#6C8CFF" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
</svg>
